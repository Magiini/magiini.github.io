<html lang="pl" data-bs-theme="dark">
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>
<body class="bg-dark">

    <div class="container py-5 ">

    <h1 class="text-center mb-4">🔥Hot Tracker🔥</h1>


    <nav class="navbar navbar-expand-lg bg-body-tertiary rounded shadow mb-4">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                🔥 Hot Tracker
            </a>

            <button class="navbar-toggler" 
                    type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link active" href="kolekcja.html">

                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="lista_modeli.html">

        </div>
    </nav>

</div>
<div class="container mt-1">
    
<div class="card shadow mb-4">
<div class="card-body">

<div class="row g-3">


<div class="col-md-4">
<label class="form-label">Szukaj modelu</label>
<input 
type="text" 
id="szukaj" 
class="form-control"
placeholder="np. Porsche">
</div>


<div class="col-md-4">
<label class="form-label">Seria</label>

<select id="filtrSeria" class="form-select">

<option value="">Wszystkie</option>
<option value="Mainline">Mainline</option>
<option value="Silver Series">Silver Series</option>
<option value="Premium">Premium</option>
<option value="Inny">Inny</option>

</select>

</div>


<div class="col-md-4">
<label class="form-label">Rok</label>

<select id="filtrRok" class="form-select">

<option value="">Wszystkie</option>
<option value="2026">2026</option>
<option value="2025">2025</option>
<option value="2024">2024</option>
<option value="2023">2023</option>

</select>

</div>

</div>

</div>
</div>

<div class="card shadow mb-4">
<div class="card-body text-center">

<h3>
💰 Wartość kolekcji:
<span id="wartoscKolekcji">
Ładowanie...
</span>
</h3>
</div>
</div>

<div class="card shadow">

<div class="card-body">


<table class="table table-dark table-striped">

<thead>

<tr>
<th>Nazwa</th>
<th>Seria</th>
<th>Podseria</th>
<th>Numer</th>
<th>Rok</th>
<th>Ilość</th>
<th>Cena</th>
</tr>

</thead>


<tbody id="kolekcja">

</tbody>


</table>


</div>
</div>


</div>



<script>


const supabaseUrl = "https://cnlfislhzzzqfhgweaic.supabase.co";

const supabaseKey = "sb_publishable_wFtTBnYacmmgovQhqGvI6A_tBt0EyBm";


const db = window.supabase.createClient(
supabaseUrl,
supabaseKey
);



let modele = [];



// pobieranie danych

async function pobierzKolekcje(){


const {data,error}=await db
.from("Modele")
.select("*")
.gt("Ilosc",0);



if(error){

console.log("BŁĄD MODELE:",error);
return;

}

modele=data;

wyswietl();

policzWartoscKolekcji();
}





function wyswietl(){


let tabela=document.getElementById("kolekcja");


let szukaj=document.getElementById("szukaj").value.toLowerCase();

let seria=document.getElementById("filtrSeria").value;

let rok=document.getElementById("filtrRok").value;



let wynik=modele.filter(model=>{


return (

model.Nazwa_modelu.toLowerCase().includes(szukaj)

&&

(seria==="" || model.Seria===seria)

&&

(rok==="" || model.Rok==rok)

);


});



tabela.innerHTML="";


wynik.forEach(model=>{

tabela.innerHTML+=`

<tr 
style="cursor:pointer"
onclick="pokazModel('${model.id}')">

<td>${model.Nazwa_modelu}</td>

<td>${model.Seria}</td>

<td>${model.Podseria ?? ""}</td>

<td>${model.Numer ?? ""}</td>

<td>${model.Rok}</td>



<td>
<span class="badge bg-success">
${model.Ilosc} szt.
</span>
</td>

<td>

${
model.Mediana
?
model.Mediana + " USD"
:
"Brak"
}

</td>

</tr>

`;

});


}

function policzWartoscKolekcji(){

    let suma = 0;

    modele.forEach(model => {

        if(model.Mediana && model.Ilosc){

            suma += Number(model.Mediana) * Number(model.Ilosc);

        }

    });


    document.getElementById("wartoscKolekcji").innerHTML =
        suma.toFixed(2) + " USD";

}

function pokazModel(id){

window.location.href = "model.html?id=" + id;

}

document
.getElementById("szukaj")
.addEventListener("input",wyswietl);


document
.getElementById("filtrSeria")
.addEventListener("change",wyswietl);


document
.getElementById("filtrRok")
.addEventListener("change",wyswietl);





pobierzKolekcje();

let czas = sessionStorage.getItem("czasLogowania");

if(
    !sessionStorage.getItem("dostep") ||
    !czas ||
    Date.now() - czas > 60 * 60 * 1000
){

    sessionStorage.clear();

    window.location.href="pin.html";

}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
