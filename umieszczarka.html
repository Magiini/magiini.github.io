<!DOCTYPE html>
<html lang="pl" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodawanie modelu</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-dark">
<div class="container py-5 ">

    <h1 class="text-center mb-4">🔥Hot Tracker🔥</h1>


    <nav class="navbar navbar-expand-lg bg-body-tertiary rounded shadow mb-4">
        <div class="container-fluid">

            <a class="navbar-brand" href="#">
                🔥 Hot Tracker
            </a>

            <button class="navbar-toggler" 
                    type="button" 
                    data-bs-toggle="collapse" 
                    data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>


            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="kolekcja.html">
                            Kolekcja
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="lista_modeli.html">
                            Lista modeli
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="umieszczarka.html">
                            Dodaj Model
                        </a>
                    </li>

                </ul>

            </div>

        </div>
    </nav>

</div>
<div class="container py-5 col-lg-6">

    <div class="card shadow">
        <div class="card-body">

            <h2 class="text-center mb-4">Dodaj model</h2>

            <form id="formularz">

                <div class="mb-3">
                    <label class="form-label">Nazwa modelu</label>
                    <input type="text" id="Nazwa_modelu" class="form-control" required>
                </div>


                <div class="mb-3">
                    <label class="form-label">Seria</label>
                    <select id="Seria" class="form-select" required>
                        <option value="">-- wybierz serię --</option>
                        <option value="Mainline">Mainline</option>
                        <option value="Silver Series">Silver Series</option>
                        <option value="Premium">Premium</option>
                        <option value="Inny">Inny</option>
                    </select>
                </div>


                <div class="mb-3">
                    <label class="form-label">Podseria</label>
                    <input type="text" id="Podseria" class="form-control">
                </div>


                <div class="mb-3">
                    <label class="form-label">Numer</label>
                    <input type="text" id="Numer" class="form-control">
                </div>


                <div class="mb-3">
                    <label class="form-label">Rok</label>
                    <select id="Rok" class="form-select" required>
                        <option value="">-- wybierz rok --</option>
                        <option value="2026">2026</option>
                        <option value="2025">2025</option>
                        <option value="2024">2024</option>
                        <option value="2023">2023</option>
                    </select>
                </div>


                <div class="mb-3">
                    <label class="form-label">Ilość</label>
                    <select id="Ilosc" class="form-select">
                        <option value="">-- wybierz ilość --</option>
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3">3</option>
                        <option value="4">4</option>
                        <option value="5">5</option>
                    </select>
                </div>


                <button type="submit" class="btn btn-primary w-100">
                    💾 Zapisz
                </button>

            </form>


            <div id="status" class="mt-3 text-center"></div>

        </div>
    </div>

</div>


<script>

const supabaseUrl = "https://cnlfislhzzzqfhgweaic.supabase.co";

const supabaseKey = "sb_publishable_wFtTBnYacmmgovQhqGvI6A_tBt0EyBm";


const db = window.supabase.createClient(
    supabaseUrl,
    supabaseKey
);


// Formularz
document.getElementById("formularz")
.addEventListener("submit", async function(e){

    e.preventDefault();


    const dane = {

        Nazwa_modelu: document.getElementById("Nazwa_modelu").value,

        Seria: document.getElementById("Seria").value,

        Podseria: document.getElementById("Podseria").value,

        Numer: document.getElementById("Numer").value,

        Rok: Number(document.getElementById("Rok").value),

        Ilosc: Number(document.getElementById("Ilosc").value)

    };


    const { error } = await db
        .from("Modele")
        .insert([dane]);


    const status = document.getElementById("status");


    if(error){

        status.style.color = "red";
        status.innerHTML = "❌ Błąd: " + error.message;

    } else {

        status.style.color = "green";
        status.innerHTML = "✅ Model zapisany";

        document.getElementById("formularz").reset();

    }

});

let czas = sessionStorage.getItem("czasLogowania");

if(
    !sessionStorage.getItem("dostep") ||
    !czas ||
    Date.now() - czas > 60 * 60 * 1000
){

    sessionStorage.clear();

    window.location.href="pin.html";

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
